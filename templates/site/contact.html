<!-- =========================================================================
     DYNAMIC COMPONENT LOADER: Client-side include using JavaScript Fetch API
     ========================================================================= -->
     
<!-- An empty container element where JavaScript will dynamically inject the external footer HTML markup -->
<div id="footer-placeholder"></div>   

<script>
  // ==========================================
  // SECTION 1: ASYNCHRONOUSLY LOADING THE HEADER
  // ==========================================

  // Step 1: Initiates a web request to fetch the external 'header_site.html' file from the components directory
  fetch('../components/header_site.html') 
    
    /* Step 2: The .then() method handles the server response. It takes the raw stream 
       and extracts the plain text content of the HTML file using 'response.text()' */
    .then(response => response.text())
    
    /* Step 3: Once the text data is fully extracted, this line targets the 'header-placeholder' 
       element by its ID and overwrites its innerHTML with the external file's markup data */
    .then(data => document.getElementById('header-placeholder').innerHTML = data);
    
  // ==========================================
  // SECTION 2: ASYNCHRONOUSLY LOADING THE FOOTER
  // ==========================================

  // Step 1: Initiates a second independent web request to fetch the external 'footer.html' file
  fetch('../components/footer.html')
    
    /* Step 2: Handles the footer response and processes the incoming payload 
       into plain text layout strings */
    .then(response => response.text())
    
    /* Step 3: Locates the 'footer-placeholder' div container (declared above) 
       and injects the fetched footer HTML directly inside it to render on the page */
    .then(data => document.getElementById('footer-placeholder').innerHTML = data);
</script>
    
<!-- ========================================================================= -->
  
</body>
