<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Role management</title>
</head>
<body>
<!-- ============================================= -->
<div id="header-placeholder"></div>
<!-- ============================================= --
<!-- Add New Role Form -->
<div class="form-container">
    <h2 class="form-title">Edit Role</h2>
    
<!-- Edit Role Form -->
<div class="form-container">
    <h2 class="form-title">Edit Role</h2>
    
    <form action="#" method="POST">
        <!-- Role ID (Read-Only) -->
        <div class="form-group">
            <label for="role_id">Role ID</label>
            <input type="text" id="role_id" name="role_id" class="form-control" value="1" readonly>
        </div>
        
        <!-- Role Name Field -->
        <div class="form-group">
            <label for="role_name">Role Name</label>
            <input type="text" id="role_name" name="role_name" class="form-control" value="Farmer" required>
        </div>
        
        <!-- Description Field -->
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" class="form-control" required>Grower of Rambutan plantation</textarea>
        </div>
        
        <!-- Form Action Buttons -->
        <div class="form-actions">
            <a href="admin_roles.html" class="btn-cancel">Cancel</a>
            <button type="submit" class="btn-submit">Update Role</button>
        </div>
    </form>
</div>


</main>
 
<!-- ============================================= -->
    
 <div id="footer-placeholder"></div>   
<script>
    // Load header
    fetch('../components/header_portaladmin.html') 
      .then(response => response.text())
      .then(data => document.getElementById('header-placeholder').innerHTML = data);
    
    // Load footer
    fetch('../components/footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer-placeholder').innerHTML = data);
  </script>
    
<!-- ============================================= -->


</body>
</html>
