<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Market Location</title>
    <link rel="stylesheet" href="../ostyle.css">
    <link rel="stylesheet" href="../formsstyle.css">
</head>
<body>

 
<!-- ============================================= -->
<div id="header-placeholder"></div>
<!-- ============================================= -->
    <div class="form-container">
        <div class="form-title">Add New Market Location</div>
        <!-- Action will point to your Python route later, e.g., action="/add_market" -->
        <form id="addForm" action="#" method="POST">
            
            <div class="form-group">
                <label for="market_name">Market Name</label>
                <input type="text" id="market_name" name="market_name" class="form-control" placeholder="e.g., Thodupuzha Market" required>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" class="form-control" placeholder="Enter market description..." required></textarea>
            </div>
            <div class="form-group">
                <label for="show_status">Show Status</label>
                <select id="show_status" name="show_status" class="form-control">
                    <option value="1" selected>Active (Show)</option>
                    <option value="0">Inactive (Hide)</option>
                </select>
            </div>
            
            <div class="form-actions">
                <a href="../marketlocations.html" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">Add Market Location</button>
            </div>
        </form>
    </div>

    <!-- Vanilla JavaScript to simulate form submission -->
    <script>
        document.getElementById('addForm').addEventListener('submit', function(event) {
            event.preventDefault();
            alert('New market location added successfully!\n\n(Your Python backend will execute the MySQL INSERT query here).');
            window.location.href = '../marketlocations.html';
        });
    </script>

<!-- ============================================= -->
    
 <div id="footer-placeholder"></div>   
<script>
    // Load header
    fetch('../../components/header_portaladmin.html') 
      .then(response => response.text())
      .then(data => document.getElementById('header-placeholder').innerHTML = data);
    
    // Load footer
    fetch('../../components/footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer-placeholder').innerHTML = data);
  </script>
    
<!-- ============================================= -->

</body>
</html>
