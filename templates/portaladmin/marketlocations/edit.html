
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Market Location</title>
    <link rel="stylesheet" href="../ostyle.css">
    <link rel="stylesheet" href="../formsstyle.css">
</head>
<body>
<!-- ============================================= -->
<div id="header-placeholder"></div>
<!-- ============================================= -->

    <div class="form-container">
        <div class="form-title">Edit Market Location</div>
        <!-- Action will point to your Python route later, e.g., action="/update_market" -->
        <form id="editForm" action="#" method="POST">
            <input type="hidden" name="market_id" value="1">
            
            <div class="form-group">
                <label for="market_name">Market Name</label>
                <input type="text" id="market_name" name="market_name" class="form-control" value="Thodupuzha Market" required>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" class="form-control" required>A bustling municipal commercial center serving as a primary transit point for agricultural produce coming from the Idukki foothills.</textarea>
            </div>
            <div class="form-group">
                <label for="show_status">Show Status</label>
                <select id="show_status" name="show_status" class="form-control">
                    <option value="1" selected>Active (Show)</option>
                    <option value="0">Inactive (Hide)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Created Time</label>
                <input type="text" class="form-control" value="2026-07-14 06:00:00" readonly>
            </div>
            
            <div class="form-actions">
                <a href="../marketlocations.html" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">Update Market Location</button>
            </div>
        </form>
    </div>

    <!-- Vanilla JavaScript to simulate form submission -->
    <script>
        document.getElementById('editForm').addEventListener('submit', function(event) {
            event.preventDefault();
            alert('Market location updated successfully!\n\n(Your Python backend will execute the MySQL UPDATE query here).');
            window.location.href = '../marketlocations.html';
        });
    </script>
<!-- ============================================= -->
    
 <div id="footer-placeholder"></div>   
<script>
    // Load header
    fetch('../../components/header_portaladmin.html') 
      .then(response => response.text())
      .then(data => document.getElementById('header-placeholder').innerHTML = data);
    
    // Load footer
    fetch('../../components/footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer-placeholder').innerHTML = data);
  </script>
    
<!-- ============================================= -->
</body>
</html>
