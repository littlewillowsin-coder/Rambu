
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Variety</title>
 
</head>
<body>
 
<!-- ============================================= -->
<div id="header-placeholder"></div>
<!-- ============================================= -->

    <div class="form-container">
        <div class="form-title">Add New Variety</div>
        <!-- The action attribute will point to your Python route later, e.g., action="/add_variety" -->
        <form id="addForm" action="#" method="POST">
            
            <div class="form-group">
                <label for="variety_name">Variety Name</label>
                <input type="text" id="variety_name" name="variety_name" class="form-control" placeholder="e.g., R134" required>
            </div>
            <div class="form-group">
                <label for="origin">Origin</label>
                <input type="text" id="origin" name="origin" class="form-control" placeholder="e.g., Malaysia" required>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" class="form-control" placeholder="Enter description..." required></textarea>
            </div>
            <div class="form-group">
                <label for="typical_shelf_life_days">Typical Shelf Life (Days)</label>
                <input type="number" id="typical_shelf_life_days" name="typical_shelf_life_days" class="form-control" placeholder="e.g., 5" required>
            </div>
            <div class="form-group">
                <label for="color">Color</label>
                <input type="text" id="color" name="color" class="form-control" placeholder="e.g., Deep Red" required>
            </div>
            <div class="form-group">
                <label for="sweetness_level">Sweetness Level</label>
                <input type="text" id="sweetness_level" name="sweetness_level" class="form-control" placeholder="e.g., Very High" required>
            </div>
            <div class="form-group">
                <label for="show_status">Show Status</label>
                <select id="show_status" name="show_status" class="form-control">
                    <option value="1" selected>Active (Show)</option>
                    <option value="0">Inactive (Hide)</option>
                </select>
            </div>
            
            <div class="form-actions">
                <a href="../varieties.html" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">Add Variety</button>
            </div>
        </form>
    </div>

    <!-- Vanilla JavaScript to simulate form submission -->
    <script>
        document.getElementById('addForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Stops the browser from actually submitting the form
            
            // Simulate backend processing
            alert('New variety added successfully!\n\n(Your Python backend will execute the MySQL INSERT query here).');
            
            // Simulate redirect back to the list page
            window.location.href = '../varieties.html';
        });
    </script>


<!-- ============================================= -->
    
 <div id="footer-placeholder"></div>   
<script>
    // Load header
    fetch('../../components/header_portaladmin.html') 
      .then(response => response.text())
      .then(data => document.getElementById('header-placeholder').innerHTML = data);
    
    // Load footer
    fetch('../../components/footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer-placeholder').innerHTML = data);
  </script>
    
<!-- ============================================= -->

</body>
</html>
