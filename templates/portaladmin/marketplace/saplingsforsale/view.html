<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Sapling Listing</title>
    <link rel="stylesheet" href="../ostyle.css">
    <link rel="stylesheet" href="../formsstyle.css">
</head>
<body>
 
  <!-- ============================================= -->
<div id="header-placeholder"></div>
<!-- ============================================= -->  
  
    <div class="form-container">
        <div class="form-title">View Sapling Listing Details</div>
        <form>
            <div class="form-group"><label>Sapling ID</label><input type="text" class="form-control" value="1" readonly></div>
            <div class="form-group"><label>Nursery Owner</label><input type="text" class="form-control" value="33 - Jose Thomas" readonly></div>
            <div class="form-group"><label>Variety</label><input type="text" class="form-control" value="1 R134 Large fruit thick flesh easy to peel Deep Red Sweetness: Very High" readonly></div>
            <div class="form-group"><label>Plant Age (Months)</label><input type="text" class="form-control" value="5" readonly></div>
            <div class="form-group"><label>Plant Height (cm)</label><input type="text" class="form-control" value="60" readonly></div>
            <div class="form-group"><label>Price per Unit (₹)</label><input type="text" class="form-control" value="250" readonly></div>
            <div class="form-group"><label>Quantity Available</label><input type="text" class="form-control" value="500" readonly></div>
            <div class="form-group"><label>Is Grafted</label><input type="text" class="form-control" value="Yes" readonly></div>
            <div class="form-group"><label>Disease Resistance Notes</label><textarea class="form-control" readonly>High resistance to root rot</textarea></div>
            <div class="form-group"><label>Status</label><input type="text" class="form-control" value="Available" readonly></div>
            <div class="form-actions"><a href="../saplingsforsale.html" class="btn-cancel">Back to List</a></div>
        </form>
    </div>

  <!-- ============================================= -->

    
 <div id="footer-placeholder"></div>   
<script>
    // Load header
    fetch('../../../components/header_portaladmin.html') 
      .then(response => response.text())
      .then(data => document.getElementById('header-placeholder').innerHTML = data);
    
    // Load footer
    fetch('../../../components/footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer-placeholder').innerHTML = data);
  </script>
    
<!-- ============================================= -->
</body>
</html>
