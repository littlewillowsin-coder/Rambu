<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Rambutan Listing</title>
    <link rel="stylesheet" href="../ostyle.css">
    <link rel="stylesheet" href="../formsstyle.css">
</head>
<body>
<!-- ============================================= -->
<div id="header-placeholder"></div>
<!-- ============================================= -->   

    
    <div class="form-container">
        <div class="form-title">View Rambutan Listing Details</div>
        <form>
            <div class="form-group"><label>Listing ID</label><input type="text" class="form-control" value="1" readonly></div>
            <div class="form-group"><label>Farmer</label><input type="text" class="form-control" value="7 - Ani Varghese" readonly></div>
            <div class="form-group"><label>Farm ID</label><input type="text" class="form-control" value="4" readonly></div>
            <div class="form-group"><label>Variety</label><input type="text" class="form-control" value="9 R130 Early-season variant robust yield Deep Red Sweetness: High" readonly></div>
            <div class="form-group"><label>Variety ID</label><input type="text" class="form-control" value="9" readonly></div>
            <div class="form-group"><label>Quality Grade</label><input type="text" class="form-control" value="A+" readonly></div>
            <div class="form-group"><label>Quantity (kg)</label><input type="text" class="form-control" value="5000" readonly></div>
            <div class="form-group"><label>Price per kg (₹)</label><input type="text" class="form-control" value="85" readonly></div>
            <div class="form-group"><label>Available Date</label><input type="text" class="form-control" value="2026-06-15" readonly></div>
            <div class="form-group"><label>Status</label><input type="text" class="form-control" value="Available" readonly></div>
            <div class="form-group"><label>Created At</label><input type="text" class="form-control" value="2026-06-05 10:00:00" readonly></div>
            <div class="form-actions"><a href="../rambutanforsale.html" class="btn-cancel">Back to List</a></div>
        </form>
    </div>

 <div id="footer-placeholder"></div>   
<script>
    // Load header
    fetch('../../../components/header_portaladmin.html') 
      .then(response => response.text())
      .then(data => document.getElementById('header-placeholder').innerHTML = data);
    
    // Load footer
    fetch('../../../components/footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer-placeholder').innerHTML = data);
  </script>
    
<!-- ============================================= -->
  
</body>
</html>
