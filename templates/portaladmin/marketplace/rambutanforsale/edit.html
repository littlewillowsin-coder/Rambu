<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Rambutan Listing</title>
    <link rel="stylesheet" href="../ostyle.css">
    <link rel="stylesheet" href="../formsstyle.css">
</head>
<body>
<!-- ============================================= -->
<div id="header-placeholder"></div>
<!-- ============================================= -->   

    <div class="form-container">
        <div class="form-title">Edit Rambutan Listing</div>
        <form id="editForm" action="#" method="POST">
            <input type="hidden" name="rambutanforsale_id" value="1">
            
            <div class="form-group">
                <label for="farmer_id">Farmer</label>
                <select id="farmer_id" name="farmer_id" class="form-control" required>
                    <option value="7" selected>7 - Ani Varghese</option>
                    <option value="4">4 - Ammu Sukumaran</option>
                    <option value="11">11 - Mathew George</option>
                    <option value="15">15 - Joseph Chacko</option>
                    <option value="17">17 - Devassy Antony</option>
                </select>
            </div>

            <div class="form-group">
                <label for="farm_id">Farm ID</label>
                <input type="number" id="farm_id" name="farm_id" class="form-control" value="4" required>
            </div>

            <div class="form-group">
                <label for="variety_id">Variety</label>
                <select id="variety_id" name="variety_id" class="form-control" required>
                    <option value="9" selected>9 - R130</option>
                    <option value="1">1 - R134</option>
                    <option value="2">2 - Rongrien</option>
                    <option value="3">3 - R156</option>
                    <option value="4">4 - R162</option>
                    <option value="5">5 - R167</option>
                    <option value="6">6 - Chom Rong</option>
                    <option value="7">7 - R170</option>
                    <option value="8">8 - Siman</option>
                    <option value="10">10 - Nibong</option>
                </select>
            </div>

            <div class="form-group"><label for="quality_grade">Quality Grade</label><input type="text" id="quality_grade" name="quality_grade" class="form-control" value="A+" required></div>
            <div class="form-group"><label for="quantity_kg">Quantity (kg)</label><input type="number" id="quantity_kg" name="quantity_kg" class="form-control" value="5000" required></div>
            <div class="form-group"><label for="price_per_kg">Price per kg (₹)</label><input type="number" step="0.01" id="price_per_kg" name="price_per_kg" class="form-control" value="85" required></div>
            <div class="form-group"><label for="available_date">Available Date</label><input type="date" id="available_date" name="available_date" class="form-control" value="2026-06-15" required></div>
            
            <div class="form-group">
                <label for="status">Status</label>
                <select id="status" name="status" class="form-control">
                    <option value="Available" selected>Available</option>
                    <option value="Sold">Sold</option>
                    <option value="Expired">Expired</option>
                </select>
            </div>

            <div class="form-group"><label>Created At</label><input type="text" class="form-control" value="2026-06-05 10:00:00" readonly></div>
            
            <div class="form-actions">
                <a href="../rambutanforsale.html" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">Update Listing</button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('editForm').addEventListener('submit', function(event) {
            event.preventDefault();
            alert('Listing updated successfully!\n(Python backend will execute the MySQL UPDATE query here).');
            window.location.href = '../rambutanforsale.html';
        });
    </script>

  
<!-- ============================================= -->

    
 <div id="footer-placeholder"></div>   
<script>
    // Load header
    fetch('../../../components/header_portaladmin.html') 
      .then(response => response.text())
      .then(data => document.getElementById('header-placeholder').innerHTML = data);
    
    // Load footer
    fetch('../../../components/footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer-placeholder').innerHTML = data);
  </script>
    
<!-- ============================================= -->

</body>
</html>
