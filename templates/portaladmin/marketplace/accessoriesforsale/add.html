<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Accessory</title>
    <link rel="stylesheet" href="../ostyle.css">
    <link rel="stylesheet" href="../formsstyle.css">
</head>
<body>
<!-- ============================================= -->
<div id="header-placeholder"></div>
<!-- ============================================= -->   

    <div class="form-container">
        <div class="form-title">Add New Accessory</div>
        <form id="addForm" action="#" method="POST">
            
            <div class="form-group">
                <label for="supplier_id">Supplier</label>
                <select id="supplier_id" name="supplier_id" class="form-control" required>
                    <option value="" disabled selected>-- Select Supplier --</option>
                    <option value="48">48 - Rahul Eastland</option>
                    <option value="49">49 - Shibu Varghese</option>
                    <option value="50">50 - Vince Joseph</option>
                    <option value="51">51 - Prema Kumari</option>
                    <option value="52">52 - Saju Paul</option>
                    <option value="53">53 - Ubaid Rahman</option>
                    <option value="54">54 - Gita Ramakrishnan</option>
                    <option value="55">55 - Xavier D'Souza</option>
                    <option value="56">56 - Latha Madhavan</option>
                    <option value="57">57 - Pradeep Kumar</option>
                    <option value="58">58 - Salim Malik</option>
                    <option value="59">59 - Mercy Abraham</option>
                    <option value="60">60 - Anil Bhaskar</option>
                    <option value="61">61 - Sindhu Suresh</option>
                    <option value="62">62 - Joby Mathew</option>
                </select>
            </div>

            <div class="form-group">
                <label for="suppliescategory">Category</label>
                <select id="suppliescategory" name="suppliescategory" class="form-control" required>
                    <option value="" disabled selected>-- Select Category --</option>
                    <option value="Crop Protection">Crop Protection</option>
                    <option value="Pruning & Grafting">Pruning & Grafting</option>
                    <option value="Soil & Nutrition">Soil & Nutrition</option>
                    <option value="Irrigation & Water">Irrigation & Water</option>
                    <option value="Harvesting & Storage">Harvesting & Storage</option>
                    <option value="Nursery & Growth">Nursery & Growth</option>
                </select>
            </div>

            <div class="form-group"><label for="item_name">Item Name</label><input type="text" id="item_name" name="item_name" class="form-control" placeholder="e.g., Nylon Bird Netting" required></div>
            <div class="form-group"><label for="brand">Brand</label><input type="text" id="brand" name="brand" class="form-control" placeholder="e.g., AgroShield" required></div>
            <div class="form-group"><label for="description">Description</label><textarea id="description" name="description" class="form-control" placeholder="Enter accessory description..." required></textarea></div>
            <div class="form-group"><label for="price_per_unit">Price per Unit (₹)</label><input type="number" step="0.01" id="price_per_unit" name="price_per_unit" class="form-control" placeholder="e.g., 45.00" required></div>
            <div class="form-group"><label for="quantity_available">Quantity Available</label><input type="number" id="quantity_available" name="quantity_available" class="form-control" placeholder="e.g., 100" required></div>
            
            <div class="form-group">
                <label for="unit_of_measure">Unit of Measure</label>
                <select id="unit_of_measure" name="unit_of_measure" class="form-control" required>
                    <option value="" disabled selected>-- Select Unit --</option>
                    <option value="Piece">Piece</option>
                    <option value="Meter">Meter</option>
                    <option value="kg">kg</option>
                    <option value="Liter">Liter</option>
                    <option value="Roll">Roll</option>
                </select>
            </div>

            <div class="form-group">
                <label for="status">Status</label>
                <select id="status" name="status" class="form-control" required>
                    <option value="Available" selected>Available</option>
                    <option value="Out of Stock">Out of Stock</option>
                </select>
            </div>
            
            <div class="form-actions">
                <a href="../accessoriesforsale.html" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">Add Accessory</button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('addForm').addEventListener('submit', function(event) {
            event.preventDefault();
            alert('New accessory added successfully!\n(Python backend will execute the MySQL INSERT query here).');
            window.location.href = '../accessoriesforsale.html';
        });
    </script>

  
<!-- ============================================= -->

    
 <div id="footer-placeholder"></div>   
<script>
    // Load header
    fetch('../../../components/header_portaladmin.html') 
      .then(response => response.text())
      .then(data => document.getElementById('header-placeholder').innerHTML = data);
    
    // Load footer
    fetch('../../../components/footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer-placeholder').innerHTML = data);
  </script>
    
<!-- ============================================= -->
</body>
</html>
