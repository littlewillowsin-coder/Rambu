<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Buying Rambutan Request</title>
    <link rel="stylesheet" href="../ostyle.css">
    <link rel="stylesheet" href="../formsstyle.css">
</head>
<body>

<!-- ============================================= -->
<div id="header-placeholder"></div>
<!-- ============================================= -->    

<div class="form-container">
    <div class="form-title">View Buying Rambutan Request</div>
    <form id="viewForm">
        
        <div class="form-group">
            <label for="buyingrambutan_id">Request ID</label>
            <input type="number" id="buyingrambutan_id" name="buyingrambutan_id" class="form-control" value="1" readonly>
        </div>
        
        <div class="form-group">
            <label for="created_at">Created At</label>
            <input type="text" id="created_at" name="created_at" class="form-control" value="2026-06-05 11:00:00" readonly>
        </div>
        
        <div class="form-group">
            <label for="buyer">Buyer</label>
            <input type="text" id="buyer" name="buyer" class="form-control" value="18 - Mary Thomas" readonly>
        </div>
        
        <div class="form-group">
            <label for="variety">Variety Description</label>
            <textarea id="variety" name="variety" class="form-control" rows="3" readonly>1 R134 Large fruit thick flesh easy to peel Deep Red Sweetness: Very High</textarea>
        </div>
        
        <div class="form-group">
            <label for="variety_id">Variety ID</label>
            <input type="number" id="variety_id" name="variety_id" class="form-control" value="1" readonly>
        </div>
        
        <div class="form-group">
            <label for="quality_grade">Quality Grade</label>
            <input type="text" id="quality_grade" name="quality_grade" class="form-control" value="A+" readonly>
        </div>
        
        <div class="form-group">
            <label for="quantity_kg">Quantity (kg)</label>
            <input type="number" id="quantity_kg" name="quantity_kg" class="form-control" value="5000" readonly>
        </div>
        
        <div class="form-group">
            <label for="price_per_kg">Price per kg</label>
            <input type="number" step="0.01" id="price_per_kg" name="price_per_kg" class="form-control" value="85" readonly>
        </div>
        
        <div class="form-group">
            <label for="required_date">Required Date</label>
            <input type="text" id="required_date" name="required_date" class="form-control" value="2026-06-20" readonly>
        </div>
        
        <div class="form-group">
            <label for="status">Status</label>
            <input type="text" id="status" name="status" class="form-control" value="Pending" readonly>
        </div>
        
        <div class="form-actions">
            <a href="buyingrambutan.html" class="btn-cancel">Back to List</a>
            <a href="edit.html?id=1" class="btn-submit">Edit Request</a>
        </div>
    </form>
</div>

<!-- ============================================= -->

    
 <div id="footer-placeholder"></div>   
<script>
    // Load header
    fetch('../../../components/header_portaladmin.html') 
      .then(response => response.text())
      .then(data => document.getElementById('header-placeholder').innerHTML = data);
    
    // Load footer
    fetch('../../../components/footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer-placeholder').innerHTML = data);
  </script>
    
<!-- ============================================= -->


</body>
</html>
