<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Buying Rambutan Request</title>
    <link rel="stylesheet" href="../ostyle.css">
    <link rel="stylesheet" href="../formsstyle.css">
</head>
<body>

<!-- ============================================= -->
<div id="header-placeholder"></div>
<!-- ============================================= -->    

<div class="form-container">
    <div class="form-title">Edit Buying Rambutan Request</div>
    <form id="editForm" action="#" method="POST">
        
        <div class="form-group">
            <label for="buyingrambutan_id">Request ID</label>
            <input type="number" id="buyingrambutan_id" name="buyingrambutan_id" class="form-control" value="1" readonly>
        </div>
        
        <div class="form-group">
            <label for="buyer">Buyer</label>
            <input type="text" id="buyer" name="buyer" class="form-control" value="18 - Mary Thomas" required>
        </div>
        
        <div class="form-group">
            <label for="variety_id">Variety ID</label>
            <select id="variety_id" name="variety_id" class="form-control" required>
                <option value="1" selected>1 - R134 (Large, Deep Red)</option>
                <option value="2">2 - Rongrien (Juicy, Bright Red)</option>
                <option value="3">3 - R156 (Firm, Dark Red)</option>
                <option value="4">4 - R162 (Smaller, Loose Red)</option>
                <option value="5">5 - R167 (Yellow-Red, Aromatic)</option>
                <option value="6">6 - Chom Rong (Premium Crisp)</option>
                <option value="7">7 - R170 (Late-season, Orange-Red)</option>
                <option value="8">8 - Siman (Intense candy sweetness)</option>
                <option value="9">9 - R130 (Early-season, Robust)</option>
                <option value="10">10 - Nibong (Wilder, Traditional)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="quality_grade">Quality Grade</label>
            <select id="quality_grade" name="quality_grade" class="form-control" required>
                <option value="A+" selected>A+</option>
                <option value="A">A</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B">B</option>
                <option value="Premium">Premium</option>
                <option value="Premium Bold">Premium Bold</option>
                <option value="Export Quality">Export Quality</option>
                <option value="TD5">TD5</option>
                <option value="Standard">Standard</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="quantity_kg">Quantity (kg)</label>
            <input type="number" id="quantity_kg" name="quantity_kg" class="form-control" value="5000" required>
        </div>
        
        <div class="form-group">
            <label for="price_per_kg">Price per kg</label>
            <input type="number" step="0.01" id="price_per_kg" name="price_per_kg" class="form-control" value="85" required>
        </div>
        
        <div class="form-group">
            <label for="required_date">Required Date</label>
            <input type="date" id="required_date" name="required_date" class="form-control" value="2026-06-20" required>
        </div>
        
        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status" class="form-control" required>
                <option value="Pending" selected>Pending</option>
                <option value="Completed">Completed</option>
                <option value="Cancelled">Cancelled</option>
                <option value="Hidden">Hidden (No Show)</option>
            </select>
        </div>
        
        <div class="form-actions">
            <a href="buyingrambutan.html" class="btn-cancel">Cancel</a>
            <button type="submit" class="btn-submit">Save Changes</button>
        </div>
    </form>
</div>

<!-- Vanilla JavaScript to simulate form submission -->
<script>
    document.getElementById('editForm').addEventListener('submit', function(event) {
        event.preventDefault();
        alert('Buying rambutan request updated successfully!\n\n(Your Python backend will execute the MySQL UPDATE query here).');
        window.location.href = 'buyingrambutan.html';
    });
</script>

<!-- ============================================= -->
<div id="footer-placeholder"></div>   
<script>
    fetch('../../../components/header_portaladmin.html') 
      .then(response => response.text())
      .then(data => document.getElementById('header-placeholder').innerHTML = data);
    
    fetch('../../../components/footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer-placeholder').innerHTML = data);
</script>
<!-- ============================================= -->

</body>
</html>
