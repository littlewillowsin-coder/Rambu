<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Price Record</title>
    <link rel="stylesheet" href="../ostyle.css">
    <link rel="stylesheet" href="../formsstyle.css">
</head>
<body>
<!-- ============================================= -->
<div id="header-placeholder"></div>
<!-- ============================================= -->   
    <div class="form-container">
        <div class="form-title">Edit Price Record</div>
        <form id="editForm" action="#" method="POST">
            <input type="hidden" name="price_record_id" value="1">
            
            <div class="form-group">
                <label for="market_id">Market</label>
                <select id="market_id" name="market_id" class="form-control" required>
                    <option value="1" selected>1 - Thodupuzha Market</option>
                    <option value="2">2 - Kothamangalam Market</option>
                    <option value="3">3 - Muvattupuzha Market</option>
                    <option value="4">4 - Pala Market Yard</option>
                    <option value="5">5 - Vazhakkulam Market</option>
                    <option value="6">6 - Karshaka Open Market, Thodupuzha</option>
                    <option value="7">7 - Vengalloor Market</option>
                </select>
            </div>

            <div class="form-group">
                <label for="variety_id">Variety</label>
                <select id="variety_id" name="variety_id" class="form-control" required>
                    <option value="1" selected>1 - R134</option>
                    <option value="2">2 - Rongrien</option>
                    <option value="3">3 - R156</option>
                    <option value="4">4 - R162</option>
                    <option value="5">5 - R167</option>
                    <option value="6">6 - Chom Rong</option>
                    <option value="7">7 - R170</option>
                    <option value="8">8 - Siman</option>
                    <option value="9">9 - R130</option>
                    <option value="10">10 - Nibong</option>
                </select>
            </div>

            <div class="form-group"><label for="price_low">Low Price (₹)</label><input type="number" id="price_low" name="price_low" class="form-control" value="170" required></div>
            <div class="form-group"><label for="price_high">High Price (₹)</label><input type="number" id="price_high" name="price_high" class="form-control" value="200" required></div>
            <div class="form-group"><label for="recorded_date">Recorded Date</label><input type="date" id="recorded_date" name="recorded_date" class="form-control" value="2026-07-10" required></div>
            <div class="form-group"><label for="remarks">Remarks</label><textarea id="remarks" name="remarks" class="form-control" required>Malaysia - Deep Red - Sweetness: Very High</textarea></div>
            <div class="form-group"><label for="grade">Grade</label><input type="text" id="grade" name="grade" class="form-control" value="A" maxlength="2" required></div>
            
            <div class="form-actions">
                <a href="../priceupdates.html" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">Update Price Record</button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('editForm').addEventListener('submit', function(event) {
            event.preventDefault();
            alert('Price record updated successfully!\n(Python backend will execute the MySQL UPDATE query here).');
            window.location.href = '../priceupdates.html';
        });
    </script>

<!-- ============================================= -->
    
 <div id="footer-placeholder"></div>   
<script>
    // Load header
    fetch('../../../components/header_portaladmin.html') 
      .then(response => response.text())
      .then(data => document.getElementById('header-placeholder').innerHTML = data);
    
    // Load footer
    fetch('../../../components/footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer-placeholder').innerHTML = data);
  </script>
    
<!-- ============================================= -->

  
</body>
</html>
