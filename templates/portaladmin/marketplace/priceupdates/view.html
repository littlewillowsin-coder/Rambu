<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Price Record</title>
    <link rel="stylesheet" href="../ostyle.css">
    <link rel="stylesheet" href="../formsstyle.css">
</head>
<body>
<!-- ============================================= -->
<div id="header-placeholder"></div>
<!-- ============================================= -->   
  
    <div class="form-container">
        <div class="form-title">View Price Record Details</div>
        <form>
            <div class="form-group"><label>Price Record ID</label><input type="text" class="form-control" value="1" readonly></div>
            <div class="form-group"><label>Market</label><input type="text" class="form-control" value="1 - Thodupuzha Market" readonly></div>
            <div class="form-group"><label>Variety</label><input type="text" class="form-control" value="1 - R134" readonly></div>
            <div class="form-group"><label>Low Price (₹)</label><input type="text" class="form-control" value="170" readonly></div>
            <div class="form-group"><label>High Price (₹)</label><input type="text" class="form-control" value="200" readonly></div>
            <div class="form-group"><label>Recorded Date</label><input type="text" class="form-control" value="2026-07-10" readonly></div>
            <div class="form-group"><label>Source</label><input type="text" class="form-control" value="informer@rambuportal" readonly></div>
            <div class="form-actions"><a href="../priceupdates.html" class="btn-cancel">Back to List</a></div>
        </form>
    </div>

  
<!-- ============================================= -->
    
 <div id="footer-placeholder"></div>   
<script>
    // Load header
    fetch('../../../components/header_portaladmin.html') 
      .then(response => response.text())
      .then(data => document.getElementById('header-placeholder').innerHTML = data);
    
    // Load footer
    fetch('../../../components/footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer-placeholder').innerHTML = data);
  </script>
    
<!-- ============================================= -->
</body>
</html>
