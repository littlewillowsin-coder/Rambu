<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Farmer Profile</title>
    <link rel="stylesheet" href="../ostyle.css">
    <link rel="stylesheet" href="../formsstyle.css">
</head>
<body>

<!-- ============================================= -->
<div id="header-placeholder"></div>
<!-- ============================================= -->    
 <div class="form-container">
        <div class="form-title">Edit Farmer Profile</div>
        <form id="editForm" action="#" method="POST">
            <input type="hidden" name="profile_id" value="1">
            
            <div class="form-group">
                <label for="user_id">User ID</label>
                <input type="number" id="user_id" name="user_id" class="form-control" value="4" required>
            </div>
            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" class="form-control" value="Ammu Sukumaran" required>
            </div>
            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" class="form-control" value="Deepam House" required>
            </div>
            <div class="form-group">
                <label for="location_area">Location Area</label>
                <input type="text" id="location_area" name="location_area" class="form-control" value="Kanjirappally" required>
            </div>
            <div class="form-group">
                <label for="pincode">Pincode</label>
                <input type="text" id="pincode" name="pincode" class="form-control" value="686507" required>
            </div>
            <div class="form-group">
                <label for="alternate_phone">Alternate Phone</label>
                <input type="text" id="alternate_phone" name="alternate_phone" class="form-control" value="919847222222" required>
            </div>
            <div class="form-group">
                <label for="years_of_experience">Years of Experience</label>
                <input type="number" id="years_of_experience" name="years_of_experience" class="form-control" value="12" required>
            </div>
            <div class="form-group">
                <label for="preferred_language">Preferred Language</label>
                <input type="text" id="preferred_language" name="preferred_language" class="form-control" value="Malayalam" required>
            </div>
            <div class="form-group">
                <label for="preferred_contact_method">Preferred Contact Method</label>
                <select id="preferred_contact_method" name="preferred_contact_method" class="form-control">
                    <option value="Phone" selected>Phone</option>
                    <option value="WhatsApp">WhatsApp</option>
                    <option value="Email">Email</option>
                </select>
            </div>
            <div class="form-group">
                <label for="profile_picture_url">Profile Picture URL</label>
                <input type="url" id="profile_picture_url" name="profile_picture_url" class="form-control" value="https://example.com/p4.jpg">
            </div>
            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea id="bio" name="bio" class="form-control" required>Organic farmer focusing on high-yield varieties.</textarea>
            </div>
            <div class="form-group">
                <label for="show_status">Show Status</label>
                <select id="show_status" name="show_status" class="form-control">
                    <option value="1" selected>Active (Show)</option>
                    <option value="0">Inactive (Hide)</option>
                </select>
            </div>
            
            <div class="form-actions">
                <a href="../farmers.html" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">Update Farmer</button>
            </div>
        </form>
    </div>

    <!-- Vanilla JavaScript to simulate form submission -->
    <script>
        document.getElementById('editForm').addEventListener('submit', function(event) {
            event.preventDefault();
            alert('Farmer profile updated successfully!\n\n(Your Python backend will execute the MySQL UPDATE query here).');
            window.location.href = '../farmers.html';
        });
    </script>
<!-- ============================================= -->
    
 <div id="footer-placeholder"></div>   
<script>
    // Load header
    fetch('../../../components/header_portaladmin.html') 
      .then(response => response.text())
      .then(data => document.getElementById('header-placeholder').innerHTML = data);
    
    // Load footer
    fetch('../../../components/footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer-placeholder').innerHTML = data);
  </script>
    
<!-- ============================================= -->

</body>
</html>
