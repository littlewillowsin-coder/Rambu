<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Buyer Profile</title>
    <link rel="stylesheet" href="../ostyle.css">
    <link rel="stylesheet" href="../formsstyle.css">
</head>
<body>
<!-- ============================================= -->
<div id="header-placeholder"></div>
<!-- ============================================= -->  
  

    <div class="form-container">
        <div class="form-title">Add New Buyer Profile</div>
        <form id="addForm" action="#" method="POST">
            
            <div class="form-group">
                <label for="user_id">User ID</label>
                <input type="number" id="user_id" name="user_id" class="form-control" placeholder="e.g., 18" required>
            </div>
            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" class="form-control" placeholder="e.g., Mary Thomas" required>
            </div>
            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" class="form-control" placeholder="e.g., 45/2 Green Park" required>
            </div>
            <div class="form-group">
                <label for="location_area">Location Area</label>
                <input type="text" id="location_area" name="location_area" class="form-control" placeholder="e.g., Thodupuzha" required>
            </div>
            <div class="form-group">
                <label for="pincode">Pincode</label>
                <input type="text" id="pincode" name="pincode" class="form-control" placeholder="e.g., 685584" required>
            </div>
            <div class="form-group">
                <label for="alternate_phone">Alternate Phone</label>
                <input type="text" id="alternate_phone" name="alternate_phone" class="form-control" placeholder="e.g., 919846111111" required>
            </div>
            <div class="form-group">
                <label for="years_of_experience">Years of Experience</label>
                <input type="number" id="years_of_experience" name="years_of_experience" class="form-control" placeholder="e.g., 5" required>
            </div>
            <div class="form-group">
                <label for="preferred_language">Preferred Language</label>
                <input type="text" id="preferred_language" name="preferred_language" class="form-control" placeholder="e.g., English" required>
            </div>
            <div class="form-group">
                <label for="preferred_contact_method">Preferred Contact Method</label>
                <select id="preferred_contact_method" name="preferred_contact_method" class="form-control">
                    <option value="Phone" selected>Phone</option>
                    <option value="WhatsApp">WhatsApp</option>
                    <option value="Email">Email</option>
                </select>
            </div>
            <div class="form-group">
                <label for="profile_picture_url">Profile Picture URL</label>
                <input type="url" id="profile_picture_url" name="profile_picture_url" class="form-control" placeholder="https://example.com/image.jpg">
            </div>
            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea id="bio" name="bio" class="form-control" placeholder="Enter buyer bio..." required></textarea>
            </div>
            <div class="form-group">
                <label for="show_status">Show Status</label>
                <select id="show_status" name="show_status" class="form-control">
                    <option value="1" selected>Active (Show)</option>
                    <option value="0">Inactive (Hide)</option>
                </select>
            </div>
            
            <div class="form-actions">
                <a href="../buyers.html" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">Add Buyer</button>
            </div>
        </form>
    </div>

    <!-- Vanilla JavaScript to simulate form submission -->
    <script>
        document.getElementById('addForm').addEventListener('submit', function(event) {
            event.preventDefault();
            alert('New buyer profile added successfully!\n\n(Your Python backend will execute the MySQL INSERT query here).');
            window.location.href = '../buyers.html';
        });
    </script>

  <!-- ============================================= -->
    
 <div id="footer-placeholder"></div>   
<script>
    // Load header
    fetch('../../../components/header_portaladmin.html') 
      .then(response => response.text())
      .then(data => document.getElementById('header-placeholder').innerHTML = data);
    
    // Load footer
    fetch('../../../components/footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer-placeholder').innerHTML = data);
  </script>
    

<!-- ============================================= -->  
  
</body>
</html>
