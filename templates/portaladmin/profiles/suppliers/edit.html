<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Supplier Profile</title>
    <link rel="stylesheet" href="../ostyle.css">
    <link rel="stylesheet" href="../formsstyle.css">
</head>
<body>
 <!-- ============================================= -->
<div id="header-placeholder"></div>
<!-- ============================================= -->   
    <div class="form-container">
        <div class="form-title">Edit Supplier Profile</div>
        <form id="editForm" action="#" method="POST">
            <input type="hidden" name="profile_id" value="116">
            
            <div class="form-group"><label for="user_id">User ID</label><input type="number" id="user_id" name="user_id" class="form-control" value="48" required></div>
            <div class="form-group"><label for="full_name">Full Name</label><input type="text" id="full_name" name="full_name" class="form-control" value="Rahul Eastland" required></div>
            <div class="form-group"><label for="address">Address</label><input type="text" id="address" name="address" class="form-control" value="Premier Tools & Hardware Co." required></div>
            <div class="form-group"><label for="location_area">Location Area</label><input type="text" id="location_area" name="location_area" class="form-control" value="Kanjirappally" required></div>
            <div class="form-group"><label for="alternate_phone">Alternate Phone</label><input type="text" id="alternate_phone" name="alternate_phone" class="form-control" value="919447077799" required></div>
            <div class="form-group"><label for="years_of_experience">Years of Experience</label><input type="number" id="years_of_experience" name="years_of_experience" class="form-control" value="9" required></div>
            
            <div class="form-group">
                <label for="preferred_contact_method">Preferred Contact Method</label>
                <select id="preferred_contact_method" name="preferred_contact_method" class="form-control">
                    <option value="Phone Call">Phone Call</option>
                    <option value="WhatsApp" selected>WhatsApp</option>
                    <option value="Email">Email</option>
                </select>
            </div>
            
            <div class="form-group"><label for="profile_picture_url">Profile Picture URL</label><input type="text" id="profile_picture_url" name="profile_picture_url" class="form-control" value="uploads/profiles/48.jpg"></div>
            <div class="form-group"><label for="bio">Bio</label><textarea id="bio" name="bio" class="form-control" required>Wholesale supplier of premium specialized pruning tools and shears.</textarea></div>
            
            <div class="form-group">
                <label for="show_status">Show Status</label>
                <select id="show_status" name="show_status" class="form-control">
                    <option value="1" selected>Active (Show)</option>
                    <option value="0">Inactive (Hide)</option>
                </select>
            </div>
            
            <div class="form-actions">
                <a href="../suppliers.html" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">Update Supplier</button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('editForm').addEventListener('submit', function(event) {
            event.preventDefault();
            alert('Supplier profile updated successfully!\n(Python backend will execute the MySQL UPDATE query here).');
            window.location.href = '../suppliers.html';
        });
    </script>

  
<!-- ============================================= -->
    
 
    
 <div id="footer-placeholder"></div>   
<script>
    // Load header
    fetch('../../../components/header_portaladmin.html') 
      .then(response => response.text())
      .then(data => document.getElementById('header-placeholder').innerHTML = data);
    
    // Load footer
    fetch('../../../components/footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer-placeholder').innerHTML = data);
  </script>
 
    
<!-- ============================================= -->
</body>
</html>
