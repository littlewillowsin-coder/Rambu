<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Supplier Profile</title>
    <link rel="stylesheet" href="../ostyle.css">
    <link rel="stylesheet" href="../formsstyle.css">
</head>
<body>

  <!-- ============================================= -->
<div id="header-placeholder"></div>
<!-- ============================================= -->  
   
    <div class="form-container">
        <div class="form-title">View Supplier Profile Details</div>
        <form>
            <div class="form-group"><label>Profile ID</label><input type="text" class="form-control" value="116" readonly></div>
            <div class="form-group"><label>User ID</label><input type="text" class="form-control" value="48" readonly></div>
            <div class="form-group"><label>Full Name</label><input type="text" class="form-control" value="Rahul Eastland" readonly></div>
            <div class="form-group"><label>Address</label><input type="text" class="form-control" value="Premier Tools & Hardware Co." readonly></div>
            <div class="form-group"><label>Location Area</label><input type="text" class="form-control" value="Kanjirappally" readonly></div>
            <div class="form-group"><label>Alternate Phone</label><input type="text" class="form-control" value="919447077799" readonly></div>
            <div class="form-group"><label>Years of Experience</label><input type="text" class="form-control" value="9" readonly></div>
            <div class="form-group"><label>Preferred Contact Method</label><input type="text" class="form-control" value="WhatsApp" readonly></div>
            <div class="form-group"><label>Profile Picture URL</label><input type="text" class="form-control" value="uploads/profiles/48.jpg" readonly></div>
            <div class="form-group"><label>Bio</label><textarea class="form-control" readonly>Wholesale supplier of premium specialized pruning tools and shears.</textarea></div>
            <div class="form-actions"><a href="../suppliers.html" class="btn-cancel">Back to List</a></div>
        </form>
    </div>

  
<!-- ============================================= -->
    
 <div id="footer-placeholder"></div>   
<script>
    // Load header
    fetch('../../../components/header_portaladmin.html') 
      .then(response => response.text())
      .then(data => document.getElementById('header-placeholder').innerHTML = data);
    
    // Load footer
    fetch('../../../components/footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer-placeholder').innerHTML = data);
  </script>
    
<!-- ============================================= -->
  
</body>
</html>
