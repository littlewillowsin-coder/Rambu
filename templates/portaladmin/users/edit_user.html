<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RambuConnect PORTAL Admin</title>
  
</head>
<body>
<!-- ============================================= -->
<div id="header-placeholder"></div>
<!-- ============================================= --


<section class="middle">
 
<!-- ====Give appropriate heading below --->
<h2 style="text-align: center; color: var(--brand-green); margin-bottom: 20px;">Rambutan USERS</h2>




<!-- Wrapped in .middle from ostyle.css -->
<div class="middle">
    <div class="form-container">
        <h2 class="form-title">Edit User Details</h2>
        
        <form action="#" method="POST">
            <!-- Read-only field -->
            <div class="form-group">
                <label for="user_id">User ID</label>
                <input type="text" id="user_id" class="form-control" value="3" disabled>
            </div>

            <!-- Username is now disabled -->
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" value="rajesh_farmer" disabled>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" value="rajesh@gmail.com" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" class="form-control" value="+919847000001" required>
            </div>

            <!-- Role dropdown is disabled because the user's role is 1 - Farmer -->
            <div class="form-group">
                <label for="role_id">Role</label>
                <select id="role_id" name="role_id" class="form-control" disabled>
                    <option value="1" selected>1 - Farmer</option>
                    <option value="5">5 - Price Informer</option>
                    <option value="99">99 - Admin</option>
                </select>
            </div>

            <div class="form-group">
                <label for="is_active">Status</label>
                <select id="is_active" name="is_active" class="form-control">
                    <option value="1" selected>Active</option>
                    <option value="0">Inactive</option>
                </select>
            </div>
            
            <!-- Form Actions automatically aligns buttons to the right with proper spacing -->
            <div class="form-actions">
                <a href="../users.html" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">Save Changes</button>
            </div>
        </form>
    </div>
</div>


 
<!-- ============================================= -->
    
 <div id="footer-placeholder"></div>   
<script>
    // Load header
    fetch('../../components/header_portaladmin2.html') 
      .then(response => response.text())
      .then(data => document.getElementById('header-placeholder').innerHTML = data);
    
    // Load footer
    fetch('../../components/footer2.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer-placeholder').innerHTML = data);
  </script>
    
<!-- ============================================= -->
    
</body>
</html>
