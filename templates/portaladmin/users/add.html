<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New User Profile</title>
    <link rel="stylesheet" href="../ostyle.css">
    <link rel="stylesheet" href="../formsstyle.css">
</head>
<body>

<!-- ============================================= -->
<div id="header-placeholder"></div>
<!-- ============================================= -->    

    
   <div class="form-container">
        <div class="form-title">Add New User Profile</div>
        <form id="addForm" action="#" method="POST">
            
            <div class="form-group">
                <label for="user_id">User ID</label>
                <input type="number" id="user_id" name="user_id" class="form-control" placeholder="e.g., 50" required>
            </div>
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="e.g., new_farmer" required>
            </div>
            
            <div class="form-group">
                <label for="password_hash">Password Hash</label>
                <input type="text" id="password_hash" name="password_hash" class="form-control" placeholder="e.g., $2y$10$..." required>
                <small style="color: #666; font-size: 0.85em;">(Note: In production, use a plain password field and hash it in the Python backend)</small>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="e.g., user@rambuportal.com" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone" class="form-control" placeholder="e.g., +919847000000" required>
            </div>
            
            <div class="form-group">
                <label for="role_id">Role ID</label>
                <select id="role_id" name="role_id" class="form-control" required>
                    <option value="1">1 - Farmer</option>
                    <option value="2">2 - Buyer</option>
                    <option value="3">3 - Nursery</option>
                    <option value="4">4 - Supplier</option>
                    <option value="5">5 - Price Informer</option>
                    <option value="99">99 - Admin</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="is_active">Status</label>
                <select id="is_active" name="is_active" class="form-control">
                    <option value="1" selected>Active (Show)</option>
                    <option value="0">Inactive (Hide)</option>
                </select>
            </div>
            
            <div class="form-actions">
                <a href="users.html" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">Add User</button>
            </div>
        </form>
    </div>

    <!-- Vanilla JavaScript to simulate form submission -->
    <script>
        document.getElementById('addForm').addEventListener('submit', function(event) {
            event.preventDefault();
            alert('New user profile added successfully!\n\n(Your Python backend will execute the MySQL INSERT query here).');
            window.location.href = 'users.html'; // Redirects back to the users list
        });
    </script>

<!-- ============================================= -->
    
 <div id="footer-placeholder"></div>   
<script>
    // Load header
    // Note: Adjust the '../' to '../../' if this file is saved inside a 'users/' subfolder
    fetch('../components/header_portaladmin.html') 
      .then(response => response.text())
      .then(data => document.getElementById('header-placeholder').innerHTML = data);
    
    // Load footer
    fetch('../components/footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer-placeholder').innerHTML = data);
</script>
    
<!-- ============================================= -->

</body>
</html>
