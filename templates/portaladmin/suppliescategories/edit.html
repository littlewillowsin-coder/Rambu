<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Supplies Category</title>
    <link rel="stylesheet" href="../ostyle.css">
    <link rel="stylesheet" href="../formsstyle.css">
</head>
<body>


<!-- ============================================= -->
<div id="header-placeholder"></div>
<!-- ============================================= -->

 <div class="form-container">
        <div class="form-title">Edit Supplies Category</div>
        <!-- Action will point to your Python route later, e.g., action="/update_category" -->
        <form id="editForm" action="#" method="POST">
            <input type="hidden" name="category_id" value="1">
            
            <div class="form-group">
                <label for="suppliescategory">Category Name</label>
                <input type="text" id="suppliescategory" name="suppliescategory" class="form-control" value="Crop Protection" required>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" class="form-control" required>Nets, bags, biological defenses, and organic sprays to guard fruits and trees against birds, pests, and fungal diseases.</textarea>
            </div>
            <div class="form-group">
                <label for="is_active">Show Status</label>
                <select id="is_active" name="is_active" class="form-control">
                    <option value="1" selected>Active (Show)</option>
                    <option value="0">Inactive (Hide)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Created At</label>
                <input type="text" class="form-control" value="2026-07-11 09:10:00" readonly>
            </div>
            
            <div class="form-actions">
                <a href="../suppliescategories.html" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">Update Category</button>
            </div>
        </form>
    </div>

    <!-- Vanilla JavaScript to simulate form submission -->
    <script>
        document.getElementById('editForm').addEventListener('submit', function(event) {
            event.preventDefault();
            alert('Category updated successfully!\n\n(Your Python backend will execute the MySQL UPDATE query here).');
            window.location.href = '../suppliescategories.html';
        });
    </script>

<!-- ============================================= -->
    
 <div id="footer-placeholder"></div>   
<script>
    // Load header
    fetch('../../components/header_portaladmin.html') 
      .then(response => response.text())
      .then(data => document.getElementById('header-placeholder').innerHTML = data);
    
    // Load footer
    fetch('../../components/footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer-placeholder').innerHTML = data);
  </script>
    
<!-- ============================================= -->


</body>
</html>
