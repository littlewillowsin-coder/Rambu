<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Line Item Details (11_Table_order_items)</title>
    <!-- Calling the external form stylesheet rules -->
    <link rel="stylesheet" href="formsstyle.css">
</head>
<body>

<!-- ============================================= -->
<div id="header-placeholder"></div>
<!-- ============================================= --> 



<div class="form-container">
    <div class="form-title">Add Line Item Details: 11_Table_order_items</div>
    
    <form action="#" method="POST">
        <!-- Field 1: Order Group Reference Link (Links to 10_Table_orders) -->
        <div class="form-group">
            <label for="order_id">Parent Order Reference (Receipt Link)</label>
            <select id="order_id" name="order_id" class="form-control" required>
                <option value="" disabled selected>Select parent checkout order...</option>
                <option value="9283">Order #9283 (Deepak Menon)</option>
                <option value="9284">Order #9284 (Anjali Nair)</option>
            </select>
        </div>

        <!-- Field 2: Polymorphic Item Type Selector -->
        <div class="form-group">
            <label for="item_type">Inventory Type</label>
            <select id="item_type" name="item_type" class="form-control" required>
                <option value="" disabled selected>Select product category...</option>
                <option value="Harvest Listing">Fresh Fruit (6_Tableharvest_listings)</option>
                <option value="Sapling Stock">Nursery Sapling (7_Table_sapling_listings)</option>
                <option value="Accessory Supply">Accessory / Tool (8_Table_accessory_listings)</option>
            </select>
        </div>

        <!-- Field 3: Specific Source Inventory Record ID -->
        <div class="form-group">
            <label for="source_item_id">Source Reference ID</label>
            <input type="number" id="source_item_id" name="source_item_id" class="form-control" placeholder="Enter corresponding ID from the target table..." required>
        </div>

        <!-- Field 4: Transaction Unit Pricing -->
        <div class="form-group">
            <label for="unit_price">Locked Price Per Unit (₹)</label>
            <input type="number" id="unit_price" name="unit_price" class="form-control" min="0.01" step="0.01" placeholder="e.g., 175.00" required>
        </div>

        <!-- Field 5: Ordered Quantity -->
        <div class="form-group">
            <label for="quantity">Purchase Quantity</label>
            <input type="number" id="quantity" name="quantity" class="form-control" min="1" placeholder="e.g., 1200" required>
        </div>

        <!-- Submission Actions Section -->
        <div class="form-actions">
            <button type="button" class="btn-cancel" onclick="window.history.back();">Cancel</button>
            <button type="submit" class="btn-submit">Add Item to Order</button>
        </div>
    </form>
</div>

    <div class="button-group" style="text-align: center;">
  <a href="add_orders.html" class="btn btn-green">Add Order</a>
</div>
 
<!-- ============================================= -->
    
 <div id="footer-placeholder"></div>   
<script>
    // Load header
    fetch('header.html')
      .then(response => response.text())
      .then(data => document.getElementById('header-placeholder').innerHTML = data);
    
    // Load footer
    fetch(' footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer-placeholder').innerHTML = data);
  </script>
    


    
</body>
</html>
