<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Account Password</title>
    <!-- Linking to your uniform form stylesheet -->
    <link rel="stylesheet" href="formsstyle.css">
</head>
<body>
<!-- ============================================= -->
<div id="header-placeholder"></div>
<!-- ============================================= --> 


<div class="form-container">
    <div class="form-title">Security Settings: Change Password</div>
    
    <form action="#" method="POST" onsubmit="return validatePasswordUpdate(event)">
        <!-- Field 1: Old Security Key -->
        <div class="form-group">
            <label for="old_password">Current Password</label>
            <input type="password" id="old_password" name="old_password" class="form-control" placeholder="Enter your current password" required>
        </div>

        <!-- Field 2: New Security Key -->
        <div class="form-group">
            <label for="new_password">New Password</label>
            <input type="password" id="new_password" name="new_password" class="form-control" placeholder="Minimum 8 characters" minlength="8" required>
        </div>

        <!-- Field 3: Confirm New Security Key -->
        <div class="form-group">
            <label for="confirm_password">Confirm New Password</label>
            <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Re-type your new password" minlength="8" required>
        </div>

        <!-- Password Strength Context Checkbox Display (Optional/Informational) -->
        <div class="form-group">
            <label>Security Requirements</label>
            <div class="checkbox-group" style="grid-template-columns: 1fr;">
                <label class="checkbox-label" style="color: #718096; cursor: default;">
                    <input type="checkbox" checked disabled> Must be at least 8 characters long
                </label>
                <label class="checkbox-label" style="color: #718096; cursor: default;">
                    <input type="checkbox" checked disabled> Cannot match your primary username or email address
                </label>
            </div>
        </div>

        <!-- Submission Actions Section -->
        <div class="form-actions">
            <button type="button" class="btn-cancel" onclick="window.history.back();">Cancel</button>
            <button type="submit" class="btn-submit">Update Password</button>
        </div>
    </form>
</div>

<script>
/**
 * Simple client-side validation check to ensure the new passwords match
 */
function validatePasswordUpdate(event) {
    const newPass = document.getElementById('new_password').value;
    const confirmPass = document.getElementById('confirm_password').value;
    
    if (newPass !== confirmPass) {
        alert("Validation Error: Your new password and confirmation password fields do not match. Please re-enter them.");
        event.preventDefault(); // Stop form submission
        return false;
    }
    
    alert("Security verification checks passed! Saving configuration settings...");
    return true;
}
</script>


  
<!-- ============================================= -->
    
 <div id="footer-placeholder"></div>   
<script>
    // Load header
    fetch('header.html')
      .then(response => response.text())
      .then(data => document.getElementById('header-placeholder').innerHTML = data);
    
    // Load footer
    fetch(' footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer-placeholder').innerHTML = data);
  </script>
    

  
</body>
</html>
